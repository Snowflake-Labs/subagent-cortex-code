# Cortexcode Tool Configuration for Codex CLI
# Installed to ~/.agents/skills/cortex-code/config.yaml by install.sh
# Audit/log go to /tmp — writable in Codex sandbox without requiring user approval

security:
  approval_mode: "auto"  # Auto-approve for non-interactive CLI usage
  audit_log_path: "/tmp/cortexcode-tool-codex-audit.log"
  sanitize_prompts: true
  block_credential_paths: true
  credential_path_patterns:
    - "~/.ssh/**"
    - "~/.aws/**"
    - "~/.snowflake/**"
    - "**/.env"
    - "**/.env.*"
    - "**/credentials.json"
    - "**/credentials.yaml"
  cache_dir: "/tmp/cortexcode-tool-cache"
  cache_ttl: 3600

cortex:
  connection_name: "default"
  default_envelope: "RW"
  session_history_limit: 3

logging:
  level: "INFO"
  format: "json"
  file: "/tmp/cortexcode-tool-codex.log"
